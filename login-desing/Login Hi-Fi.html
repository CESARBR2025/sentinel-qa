<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Login · Secretaría de Seguridad Pública Municipal</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #070b16;
    --ink-2:    #0b1220;
    --ink-3:    #111a2e;
    --line:     #1b2742;
    --line-2:   #2a3a5e;
    --text:     #d8e0f0;
    --text-dim: #7f8faf;
    --text-mute:#4a5878;
    --navy:     #14224a;
    --navy-hi:  #1e3066;
    --red:      #c0223a;
    --red-hi:   #e03349;
    --gold:     #d4a43a;
    --gold-hi:  #f0be4c;
    --ok:       #4a9e6a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background: var(--ink);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  .stage {
    position: fixed; inset: 0;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(20,34,74,0.35), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(192,34,58,0.10), transparent 60%),
      var(--ink);
  }

  /* Grid blueprint en todo el stage */
  .stage::before {
    content:'';
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  /* corners dorados */
  .corner { position:absolute; width:22px; height:22px; border-color: var(--gold); border-style:solid; border-width:0; opacity:.6; }
  .corner.tl { top:18px; left:18px; border-top-width:1px; border-left-width:1px; }
  .corner.tr { top:18px; right:18px; border-top-width:1px; border-right-width:1px; }
  .corner.bl { bottom:18px; left:18px; border-bottom-width:1px; border-left-width:1px; }
  .corner.br { bottom:18px; right:18px; border-bottom-width:1px; border-right-width:1px; }

  /* ===== PANEL IZQ ===== */
  .left {
    position: relative;
    padding: 52px 60px 44px;
    border-right: 1px solid var(--line);
    background:
      linear-gradient(180deg, rgba(20,34,74,0.35) 0%, transparent 60%),
      linear-gradient(180deg, var(--ink-2) 0%, var(--ink) 100%);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand {
    display:flex; align-items:center; gap: 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .brand-divider {
    width: 1px;
    height: 28px;
    background: linear-gradient(180deg, transparent, var(--gold), transparent);
    align-self: stretch;
    opacity: 0.55;
  }
  .brand-text {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
  }
  .brand-shield-wrap {
    flex: 0 0 auto;
    position: relative;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-shield-wrap::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,0.18) 0%,
        rgba(212,164,58,0.10) 35%,
        rgba(212,164,58,0.04) 55%,
        rgba(212,164,58,0) 72%);
    filter: blur(4px);
  }
  .brand-shield-wrap::after {
    content: none;
  }
  .brand-shield {
    position: relative;
    z-index: 1;
    height: 14px; width: 14px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }
.brand-wordmark {
    height: 10px;
    max-width: 100%;
    width: auto;
    object-fit: contain;
    object-position: left center;
    display: block;
    opacity: 0.95;
  }
  .brand-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 6px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.7;
    margin-top: 1px;
  }
  .brand-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .brand-meta .sub {
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.2em;
  }

  .headline {
    margin-top: 30px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--red);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 18px;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before {
    content:''; width:26px; height:1px; background: var(--red); display:inline-block;
  }
  .headline h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 104px;
    line-height: 0.9;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
    margin: 0;
    text-shadow: 0 0 40px rgba(212,164,58,0.15);
  }
  .headline h1 .accent { 
    color: var(--gold); 
    text-shadow: 0 0 20px rgba(212,164,58,0.35), 0 0 40px rgba(74,158,106,0.2);
  }
  .tagline {
    display: flex; gap: 10px; align-items: center;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .tagline .sep { color: var(--gold); }

  .sentinel-mark {
    margin-top: 34px;
    display: flex; align-items: center; gap: 14px;
  }
  .sentinel-mark .sm-line {
    flex: 0 0 28px; height: 1px; background: var(--gold);
  }
  .sentinel-mark .sm-line:last-child { flex: 1; }
  .sentinel-mark .sm-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: lowercase;
    line-height: 1.5;
  }
  .sentinel-mark .sm-small {
    color: var(--gold);
    font-weight: 700;
    text-transform: uppercase;
  }


  /* ===== PANEL DER ===== */
  .right {
    position: relative;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 28px;
    border-bottom: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: rgba(7,11,22,0.5);
  }
  .topbar .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold);
    display: inline-block;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .topbar .left-group, .topbar .right-group { display:flex; align-items:center; gap: 10px; }
  .topbar .right-group { color: var(--gold); }

  .main {
    padding: 120px 56px 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .form-head {
    margin-bottom: 28px;
  }
  .form-head .step-chip {
    display: inline-flex; align-items:center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--gold);
    text-transform: uppercase;
    border: 1px solid var(--gold);
    padding: 4px 10px;
    margin-bottom: 14px;
  }
  .form-head h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 34px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin: 0;
    color: var(--text);
  }
  .form-head .sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 8px;
  }

  /* Stepper */
  .stepper {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 26px;
  }
  .step {
    border-top: 2px solid var(--line-2);
    padding-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-mute);
    text-transform: uppercase;
  }
  .step .num { color: var(--text-mute); margin-right: 8px; }
  .step.active { border-top-color: var(--gold); color: var(--gold); }
  .step.active .num { color: var(--gold); }
  .step.done { border-top-color: var(--ok); color: var(--ok); }
  .step.done .num { color: var(--ok); }

  /* Inputs */
  .field { margin-bottom: 16px; }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }
  .field-label .hint { color: var(--text-mute); letter-spacing: 0.1em; }
  .field-input {
    display: flex; align-items:center; gap: 12px;
    background: var(--ink-2);
    border: 1px solid var(--line-2);
    padding: 12px 14px;
    transition: border-color .15s, box-shadow .15s;
  }
  .field-input:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,164,58,0.12);
  }
  .field-input.error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(192,34,58,0.15);
    animation: shake .35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .field-input svg { color: var(--text-dim); flex: 0 0 auto; }
  .field-input input {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.06em;
  }
  .field-input input::placeholder { color: var(--text-mute); }
  .field-input .toggle {
    background: none; border: none;
    color: var(--text-dim); cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    padding: 4px 6px;
  }
  .field-input .toggle:hover { color: var(--gold); }

  /* Row inline */
  .row {
    display:flex; justify-content: space-between; align-items:center;
    margin: 4px 0 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .row .check {
    display: flex; align-items:center; gap: 8px;
    color: var(--text-dim);
    cursor: pointer; user-select: none;
  }
  .row .check .box {
    width: 14px; height: 14px; border: 1px solid var(--line-2);
    background: var(--ink-2); display:inline-block; position: relative;
  }
  .row .check.on .box { border-color: var(--gold); }
  .row .check.on .box::after {
    content:''; position: absolute; inset: 2px;
    background: var(--gold);
  }
  .row a { color: var(--gold); text-decoration: none; }
  .row a:hover { color: var(--gold-hi); }

  /* Botones */
  .btn {
    display: flex; align-items:center; justify-content: center; gap: 12px;
    width: 100%;
    padding: 15px 18px;
    background: var(--red);
    color: #fff;
    border: 1px solid var(--red);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, transform .05s, box-shadow .15s;
    position: relative;
  }
  .btn:hover { background: var(--red-hi); box-shadow: 0 0 0 3px rgba(192,34,58,0.2); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--text); border-color: var(--line-2); }
  .btn.ghost:hover { border-color: var(--gold); color: var(--gold); box-shadow: none; }

  .btn .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* OTP */
  .otp {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .otp input {
    width: 100%;
    aspect-ratio: 1 / 1.15;
    background: var(--ink-2);
    border: 1px solid var(--line-2);
    color: var(--text);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .otp input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,164,58,0.12);
  }
  .otp input.filled { border-color: var(--gold); color: var(--gold); }
  .otp input.error { border-color: var(--red); color: var(--red); }

  .otp-meta {
    display: flex; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .otp-meta .timer { color: var(--gold); }
  .otp-meta .resend { color: var(--text-dim); cursor: pointer; background: none; border: none; font: inherit; padding: 0; }
  .otp-meta .resend:hover { color: var(--gold); }

  /* Error banner */
  .err-banner {
    margin-top: 14px;
    padding: 10px 14px;
    border-left: 3px solid var(--red);
    background: rgba(192,34,58,0.08);
    color: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    display: flex; align-items:center; gap: 10px;
  }

  /* Éxito overlay */
  .success-overlay {
    position: absolute; inset: 0;
    background: var(--ink);
    display: flex; align-items:center; justify-content:center; flex-direction: column;
    z-index: 20;
    animation: fadein .3s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .success-ring {
    width: 90px; height: 90px; border-radius: 50%;
    border: 2px solid var(--ok);
    display: flex; align-items:center; justify-content:center;
    box-shadow: 0 0 40px rgba(74,158,106,0.35);
    margin-bottom: 22px;
  }
  .success-ring svg { color: var(--ok); }
  .success-overlay h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  .success-overlay p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 0;
  }

  /* ===== TERMINAL ===== */
  .term {
    border-top: 1px solid var(--line);
    background: #050810;
    padding: 0;
    height: 240px;
    display: grid;
    grid-template-rows: auto 1fr;
  }
  .term-head {
    display: flex; align-items:center; gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--ink-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .term-head .tdot {
    width: 8px; height: 8px; display:inline-block;
  }
  .term-head .tdot.r { background: var(--red); }
  .term-head .tdot.y { background: var(--gold); }
  .term-head .tdot.g { background: var(--ok); }
  .term-head .tpath { margin-left: 6px; }
  .term-head .rec { margin-left: auto; color: var(--red); display:flex; align-items:center; gap: 6px; }
  .term-head .rec::before {
    content:''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--red); animation: pulse 1.3s ease-in-out infinite;
  }
  .term-body {
    padding: 10px 16px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    line-height: 1.65;
    color: var(--text-dim);
    overflow: hidden;
    position: relative;
  }
  .term-body .log-line { white-space: pre; }
  .term-body .t  { color: var(--text-mute); margin-right: 10px; }
  .term-body .c-ok  { color: var(--ok); }
  .term-body .c-warn{ color: var(--gold); }
  .term-body .c-err { color: var(--red); }
  .term-body .c-info{ color: #6da4d0; }
  .term-body .c-dim { color: var(--text-mute); }
  .term-body .cursor {
    display: inline-block;
    width: 7px; height: 13px;
    background: var(--gold);
    vertical-align: middle;
    margin-left: 3px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .term-body::after {
    content:''; position: absolute; left: 0; right: 0; top: 0; height: 24px;
    background: linear-gradient(to bottom, #050810, transparent);
    pointer-events: none;
  }

  /* Responsive */
  @media (max-width: 960px) {
    .stage { grid-template-columns: 1fr; grid-template-rows: auto 1fr; overflow: auto; position: static; }
    html, body { overflow: auto; }
    .left { padding: 32px 28px; }
    .headline h1 { font-size: 42px; }
    .main { padding: 28px 24px; }
    .term { height: 200px; }
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; bottom: 18px; right: 18px; z-index: 100;
    background: var(--ink-2);
    border: 1px solid var(--gold);
    padding: 14px 16px;
    width: 260px;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 16px 40px rgba(0,0,0,.55);
  }
  .tweaks h4 {
    margin: 0 0 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .tweaks .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 10px 0 6px;
  }
  .tweaks .opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweaks .opts button {
    background: transparent;
    border: 1px solid var(--line-2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    padding: 5px 9px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .tweaks .opts button.on {
    border-color: var(--gold);
    background: rgba(212,164,58,0.12);
    color: var(--gold);
  }
</style>
</head>
<body data-screen-label="Login">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="login-app.jsx"></script>
</body>
</html>
